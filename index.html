<!DOCTYPE html>
<html lang="ar">
<head>
    <meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Cache Check</title> 
    <style>
        body { margin: 0; background: black; color: #ff007f; font-family: 'Courier New', monospace; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        #lock-screen { position: relative; z-index: 100; text-align: center; background: rgba(0,0,0,0.95); padding: 40px; border: 1px solid #333; border-radius: 5px; box-shadow: 0 0 15px rgba(255, 0, 127, 0.2); }
        input { background: #111; border: 1px solid #ff007f; color: #ff007f; padding: 12px; text-align: center; font-size: 1rem; outline: none; margin-top: 20px; width: 220px; border-radius: 5px; }
        button { background: #333; color: #ff007f; border: 1px solid #ff007f; padding: 10px 25px; margin-top: 20px; cursor: pointer; font-weight: bold; }
        #overlay { position: relative; z-index: 10; text-align: center; display: none; }
        #countdown { font-size: 7rem; font-weight: bold; color: #ff007f; text-shadow: 0 0 25px #ff007f; }
        video { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 20; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div id="lock-screen">
        <div style="color: #555; font-size: 0.8rem;">AUTH_REQUIRED</div>
        <div style="color: #ff007f; font-size: 1.2rem; font-weight: bold;">ENTER ACCESS KEY</div>
        <input type="password" id="passInput" placeholder="••••••••">
        <br>
        <button onclick="checkPass()">RUN SYSTEM</button>
        <p id="error" style="color: #ff007f; font-size: 0.8rem; margin-top: 15px; display: none;">INVALID KEY</p>
    </div>
    <div id="overlay">
        <div style="color: #ff007f;">LOADING...</div>
        <div id="countdown">3</div>
    </div>
    <video id="myVideo" playsinline>
        <source src="https://files.catbox.moe/qb6l5j.mp4" type="video/mp4">
    </video>
    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const letters = "0101SECURE";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff007f1a"; ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 33);

        const correctPass = "442010"; 

        function checkPass() {
            const input = document.getElementById('passInput').value;
            const video = document.getElementById('myVideo');
            if (input === correctPass) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('overlay').style.display = 'block';
                video.load(); startCountdown();
            } else { document.getElementById('error').style.display = 'block'; }
        }
        function startCountdown() {
            let count = 3;
            const countdownElement = document.getElementById('countdown');
            const video = document.getElementById('myVideo');
            const timer = setInterval(() => {
                count--;
                if (count > 0) { countdownElement.innerText = count; }
                else { clearInterval(timer); document.getElementById('overlay').style.display = 'none'; video.style.display = 'block'; video.play(); }
            }, 1000);
        }
    </script>
</body>
</html>
